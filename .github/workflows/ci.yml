name: CI - Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/jurisconnect-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/jurisconnect-backend:latest

      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/jurisconnect-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/jurisconnect-frontend:latest