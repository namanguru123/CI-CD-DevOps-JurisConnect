name: CD - Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull naman15092005/jurisconnect-frontend:latest
            docker pull naman15092005/jurisconnect-backend:latest

            docker stop frontend || true
            docker stop backend || true


            docker rm -f frontend || true
            docker rm -f backend || true

            docker run -d -p 3000:80 --name frontend naman15092005/jurisconnect-frontend:latest
            docker run -d -p 4000:4000 --name backend naman15092005/jurisconnect-backend:latest