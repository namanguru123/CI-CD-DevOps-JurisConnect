name: CD - Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["CI for JurisConnect"]
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           
                docker pull naman15092005/jurisconnect-frontend:latest
                docker pull naman15092005/jurisconnect-backend:latest

                docker stop $(docker ps -q) || true
                docker rm $(docker ps -aq) || true

                docker run -d -p 4000:4000 \
                --name backend \
                -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
                -e JWT_SECRET="mySuperSecretJWTKey123" \
                naman15092005/jurisconnect-backend:latest

                docker run -d -p 3000:80 \
                --name frontend \
                naman15092005/jurisconnect-frontend:latest